# Alembic configuration for the Concord backend.
#
# We don't put the DB URL here — env.py reads it from config.DATABASE_URL
# at runtime so the live deployment, dev shells, and the test suite all
# see the same source of truth.

[alembic]
# Path to the migration scripts, relative to this file.
script_location = alembic

# Format used to generate migration filenames.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Sort revision files by file mtime — keeps `alembic history` chronological
# even when slugs collide.
sourceless = false

# Truncate auto-generated slugs to keep filenames sane.
truncate_slug_length = 40

# Logging — keep alembic chatty during a manual `alembic upgrade head`,
# but the lifespan integration silences it via the logging config in
# main.py.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
