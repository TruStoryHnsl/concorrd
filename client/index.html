<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="preload" as="video" href="/boot-splash.mp4" type="video/mp4" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, minimum-scale=0.1" />
    <meta name="theme-color" content="#0c0e11" />
    <!-- Concord launch buffer (INS-023): paint the dark theme and a
         real splash immediately so hard refreshes show the branded
         loading state before React and the bundle have finished
         booting. The React-side <LaunchAnimation/> takes over and
         fades this bootstrap layer out after mount. -->
    <style>
      /*
       * Boot-splash theme colour fallbacks.
       *
       * The real `--color-logo-primary` / `--color-logo-secondary`
       * variables are defined in `src/index.css`. If that stylesheet
       * has already been fetched by the browser cache these override
       * the literals below; if it's still in flight we fall back to
       * the Kinetic Node (default) brand colours so the splash never
       * paints invisible.
       *
       * Defined on :root so both the inline SVG strokes (via a CSS
       * custom property on the stroke attribute) and the node dots
       * (background / box-shadow) pick them up through the cascade
       * with no re-paint when index.css finally resolves.
       */
      :root {
        --splash-logo-primary: var(--color-logo-primary, #a5823f);
        --splash-logo-secondary: var(--color-logo-secondary, #408c96);
      }
      html, body { background: #0c0e11; color: #f4f4f7; margin: 0; }
      html { color-scheme: dark; }
      body { min-height: 100vh; }
      #boot-splash {
        /*
         * Opaque backdrop — splash owns its own dark rectangle so
         * on refresh the browser paints splash bg + animation in
         * one paint pass.
         *
         * Isolated into its own GPU compositor layer (will-change +
         * contain + transform:translateZ) so work happening in the
         * React tree below — auth restore, store subscriptions,
         * StrictMode double-mount, document.documentElement
         * attribute sets — cannot invalidate the splash's paint
         * layer and interrupt the animated WebP mid-loop. The
         * splash decodes once at mount and loops untouched until
         * display:none retires it.
         */
        position: fixed;
        inset: 0;
        z-index: 9998;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        background: #0c0e11;
        color: #f4f4f7;
        pointer-events: none;
        will-change: opacity;
        contain: strict;
        transform: translateZ(0);
      }
      .boot-splash-anim {
        /* Also promoted so the decoded video frames live on the GPU
         * and survive any paint invalidation in the parent chain. */
        will-change: transform;
        transform: translateZ(0);
        backface-visibility: hidden;
      }
      /* Ping-pong loop: only one of the two stacked videos is visible
       * at a time. The hidden one keeps its decoder warm at t=0 so the
       * handover on `ended` is a single-frame class swap. `visibility`
       * (not `display:none`) keeps the decode pipeline alive. */
      .boot-splash-anim-hidden {
        visibility: hidden;
      }
      #boot-splash-logo > .boot-splash-anim {
        position: absolute;
        inset: 0;
        margin: auto;
      }
      #boot-splash[data-state="visible"] {
        opacity: 1;
        transition: none;
      }
      /*
       * Handoff: fade out AND (after the fade completes) remove the
       * boot-splash layer from the paint entirely so there's no
       * window where both the pre-React boot mark and the React
       * LaunchAnimation mark render at the same pixel. The React
       * layer mounts with its own opacity=1 during the same tick the
       * boot layer starts its 320ms opacity transition — without
       * display:none afterwards, a second mark would linger in the
       * compositor as an invisible but still-rendered element and
       * re-appear during any layer re-composition. See
       * bootSplash.ts for the JS side that applies the
       * `.boot-splash-retired` class once the transition ends.
       */
      #boot-splash[data-state="handoff"] {
        opacity: 0;
        transition: opacity 320ms cubic-bezier(0.22, 1, 0.36, 1);
      }
      #boot-splash[data-state="handoff"].boot-splash-retired {
        display: none;
      }
      #boot-splash-logo {
        position: relative;
        /*
         * Opaque-footprint sizing.
         *
         * The inline SVG below uses `viewBox="0 0 512 512"` but the
         * visible marks only occupy the central 416×416 region (two
         * rings of stroke-width=48 centred so their outer bounds
         * reach x/y 48..464). Sizing the SVG element to `192px`
         * therefore renders the opaque marks at roughly
         * 192 × 416/512 ≈ 156px — which is the intended visual
         * weight for a launch splash. The container adds a small
         * margin for the drop-shadow so nothing clips. This treats
         * the transparent padding around the mark as part of the
         * footprint per the design brief.
         */
        width: 204px;
        height: 204px;
        display: flex;
        align-items: center;
        justify-content: center;
        filter: drop-shadow(0 20px 42px rgba(0, 0, 0, 0.35));
      }
      .boot-splash-anim {
        width: 192px;
        height: 192px;
        display: block;
        image-rendering: auto;
      }
      /*
       * System fonts only for splash text. When brand/status
       * referenced Google Fonts ("Space Grotesk"/"Manrope"), the
       * splash rendered in system-ui fallback first, then ~500ms
       * later the Google stylesheet resolved and swapped the fonts.
       * The swap changed text metrics, the flex column reflowed,
       * the img above shifted, and the browser visibly restarted
       * the WebP animation on the repaint. system-ui renders from
       * the first frame and never swaps — no reflow, no restart.
       */
      #boot-splash-brand {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        line-height: 1.3;
      }
      #boot-splash-status {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 0.8125rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #c4c5d0;
        line-height: 1.3;
      }
    </style>
    <!-- Tag <html> before first paint so CSS can branch on native vs. web.
         Tauri v2 exposes `__TAURI_INTERNALS__` at document-start;
         the legacy `__TAURI__` key is a v1 holdover that does NOT
         exist in v2 and was the source of the 2026-04-10 detection
         bug. See `client/src/api/serverUrl.ts` for the full story. -->
    <script>if(window.__TAURI_INTERNALS__)document.documentElement.classList.add('tauri')</script>
    <!-- Kill any leftover service worker from a previous deploy the
         moment this page parses, before React or the old SW's own
         activate handler can trigger a reload. This fires earlier
         than main.tsx's register() call and handles the case where
         a browser has a stuck SW that keeps reloading the page. -->
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var i = 0; i < regs.length; i++) {
            regs[i].unregister();
          }
        }).catch(function() {});
      }
    </script>
    <!-- Block pinch-zoom-IN on WebKit/iOS/Orion.
         viewport maximum-scale=1.0 is ignored by Safari/Orion, so two layers:
         1. gesturechange (WebKit-specific): scale>1 = zoom-in, block it.
            scale<1 = zoom-out, allow as recovery gesture.
         2. touchmove fallback for non-WebKit (Chrome/Android). -->
    <script>
      (function(){
        // Layer 1: WebKit gesture events (Safari, Orion, iOS Chrome)
        document.addEventListener('gesturestart',function(e){e.preventDefault();},{passive:false});
        document.addEventListener('gesturechange',function(e){
          if(e.scale>1)e.preventDefault(); // zoom-in — block
          // zoom-out (scale<1) — allowed
        },{passive:false});
        // Layer 2: touchmove fallback
        var startDist=0;
        function dist(a,b){return Math.hypot(b.clientX-a.clientX,b.clientY-a.clientY);}
        document.addEventListener('touchstart',function(e){
          if(e.touches.length===2)startDist=dist(e.touches[0],e.touches[1]);
        },{passive:true});
        document.addEventListener('touchmove',function(e){
          if(e.touches.length===2){
            var d=dist(e.touches[0],e.touches[1]);
            if(d>startDist)e.preventDefault();
          }
        },{passive:false});
      })();
    </script>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Concord" />
    <title>Concord</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=Space+Grotesk:wght@300..700&display=swap" onload="this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300..800&family=Space+Grotesk:wght@300..700&display=swap" /></noscript>
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" onload="this.rel='stylesheet'" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" /></noscript>
  </head>
  <body>
    <div id="boot-splash" data-state="visible" aria-hidden="true">
      <div id="boot-splash-logo">
        <!--
          The native HTML5 `loop` attribute pauses for one frame on every
          loop iteration while the demuxer rewinds — a 6.25s clip read as
          a visible "interrupt and restart" once every 6 seconds. Two
          stacked `<video>` elements in ping-pong (A plays while B is
          buffered to t=0; on A's end, hide A, show B and play, swap
          roles) gives a genuinely seamless loop. `loop` is omitted —
          the JS below drives the cycle.
        -->
        <video
          id="boot-splash-anim-a"
          class="boot-splash-anim"
          src="/boot-splash.mp4"
          autoplay
          muted
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>
        <video
          id="boot-splash-anim-b"
          class="boot-splash-anim boot-splash-anim-hidden"
          src="/boot-splash.mp4"
          muted
          playsinline
          preload="auto"
          aria-hidden="true"
        ></video>
      </div>
      <div id="boot-splash-brand">Concord</div>
      <div id="boot-splash-status">Waiting for host</div>
    </div>
    <script>
      (() => {
        const status = document.getElementById("boot-splash-status");
        if (status) {
          status.textContent = `Waiting for ${window.location.host || "host"}`;
        }
        // Ping-pong loop: when the active clip ends, swap to the
        // pre-buffered standby clip immediately. The standby has been
        // sitting at t=0 since DOM parse, so the swap is a single
        // class-toggle frame — no demux rewind, no visible stutter.
        const a = document.getElementById("boot-splash-anim-a");
        const b = document.getElementById("boot-splash-anim-b");
        if (!a || !b) return;
        let active = a, standby = b;
        const swap = () => {
          standby.currentTime = 0;
          standby.classList.remove("boot-splash-anim-hidden");
          active.classList.add("boot-splash-anim-hidden");
          standby.play().catch(() => {});
          // Pre-seek the now-hidden one back to 0 so it's ready for next swap.
          active.pause();
          active.currentTime = 0;
          // Swap roles.
          const tmp = active;
          active = standby;
          standby = tmp;
        };
        a.addEventListener("ended", swap);
        b.addEventListener("ended", swap);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
