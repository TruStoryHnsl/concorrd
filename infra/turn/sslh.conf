# sslh: TLS/protocol multiplexer on :443. Routes by SNI/probe to:
#   - turn.concorrd.com → coturn TLS on :5349 (TURN-over-TLS)
#   - everything else (HTTPS, anyprot) → NPM on :8444 → web/api/conduwuit
#
# 2026-05-12: ``keepalive: true`` added after a 25-day uptime wedge.
# Default sslh leaves forwarded TCP sockets without keepalives, so when
# a TURN client vanishes silently (NAT rebind, ISP drop) sslh keeps
# the half-open socket forever. Each one consumes a worker / fd slot.
# After 25 days of normal use we had 124 ESTAB sockets sitting with
# unread TLS ClientHellos and 25 CLOSE-WAIT — sslh's main loop had
# stopped consuming established sockets.
#
# 2026-05-17: ``keepalive: true`` REMOVED. The pinned image
# (ghcr.io/yrutschle/sslh:latest → sslh-select v2.3.1) does NOT
# recognise ``keepalive`` as a top-level config key. It treated the
# line as "Unknown settings" and exited at startup. turn-autoheal
# then restarted the container every ~30s, and each restart mid-
# handshake-dropped every live TLS connection it was forwarding into
# coturn. Coturn went from clean to flooded with "Connection reset by
# peer" sessions within hours, exhausting its handshake slots and
# rendering concorrd.com unreachable. That outage was diagnosed on
# 2026-05-17 by tracing 172.17.0.2 (the sslh bridge IP) back to
# turn-autoheal's restart log.
#
# Re-enabling SO_KEEPALIVE properly requires either:
#   (a) bumping the sslh image to a version that supports the key
#       (upstream sslh added it post-v2.3.1; check the changelog
#       before pinning), or
#   (b) relying on the kernel net.ipv4.tcp_keepalive_* sysctls
#       (orr1on's defaults: 7200s idle / 75s intvl / 9 probes —
#       slow but functional reaping of dead peers), or
#   (c) using sslh's per-target ``tcp_user_timeout`` option once
#       available in this build.
# Until one of those is in place, the original 25-day wedge can
# return. Monitor `ss -tan | wc -l` on the sslh container.
#
# host: 172.31.93.247 is orr1on's AWS-internal IP. If deploying on a
# different host, change to that host's loopback-or-internal IP, or
# use 127.0.0.1 if all upstreams are on the same box.
verbose: 2;
foreground: true;
listen: ( { host: "0.0.0.0"; port: "443"; } );
protocols: (
    { name: "tls";
      host: "172.31.93.247"; port: "5349";
      sni_hostnames: [ "turn.concorrd.com" ];
    },
    { name: "tls";
      host: "172.31.93.247"; port: "8444";
    },
    { name: "anyprot";
      host: "172.31.93.247"; port: "8444";
    }
);
