name: concord
options:
  bundleIdPrefix: com.concord.chat
  deploymentTarget:
    iOS: 15.0
fileGroups: [../../src]
configs:
  debug: debug
  release: release
settingGroups:
  app:
    base:
      PRODUCT_NAME: Concord
      PRODUCT_BUNDLE_IDENTIFIER: com.concord.chat
      # INS-020 signed-build settings — paid Apple Developer Program team.
      # Team 827D323V6Z was originally a free personal team under
      # colton.j.orr@gmail.com; paid enrollment upgraded it in-place on
      # 2026-04-09 (same team ID, tier flipped free→paid portal-side).
      # The cert in the keychain is `Apple Development: colton.j.orr@
      # gmail.com (HRGZN35L9K)` — the `HRGZN35L9K` parenthetical is a
      # per-certificate uniqueness tag, NOT a team ID. The real team ID
      # is in the cert's OU field, which is 827D323V6Z.
      #
      # Managed signing: Xcode auto-fetches the provisioning profile on
      # first build (cargo tauri ios build passes -allowProvisioningUpdates
      # to xcodebuild automatically).
      DEVELOPMENT_TEAM: 827D323V6Z
      CODE_SIGN_STYLE: Automatic
      CODE_SIGN_IDENTITY: "Apple Development"
targetTemplates:
  app:
    type: application
    sources:
      - path: Sources
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      groups: [app]
targets:
  concord_iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Assets.xcassets
      # Externals intentionally excluded — it only contains libapp.a
      # build artifacts that the linker finds via LIBRARY_SEARCH_PATHS.
      # Including it as a source causes xcodegen to add the .a files as
      # Resources, which conflicts with the framework dependency and
      # triggers "Multiple commands produce libapp.a".
      - path: concord_iOS
      - path: assets
        buildPhase: resources
        type: folder
      - path: LaunchScreen.storyboard
    info:
      path: concord_iOS/Info.plist
      properties:
        LSRequiresIPhoneOS: true
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities: [arm64, metal]
        # Min OS — must match `bundle.iOS.minimumSystemVersion` in
        # tauri.conf.json. iOS 15 is the floor that supports the
        # WKWebView features Concord relies on.
        MinimumOSVersion: "15.0"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # iPad multitasking — Split View / Slide Over require this.
        UIRequiresFullScreen: false
        # Privacy descriptions (App Store review requirement).
        NSLocalNetworkUsageDescription: "Concord discovers other people on the same Wi-Fi network so you can chat without a server."
        NSBonjourServices:
          - "_concord._tcp"
          - "_concord._udp"
        NSMicrophoneUsageDescription: "Concord needs microphone access to use voice channels."
        NSCameraUsageDescription: "Concord needs camera access to use video channels."
        NSBluetoothAlwaysUsageDescription: "Concord can use Bluetooth to discover nearby peers when Wi-Fi is unavailable."
        # Background modes — "audio" so LiveKit voice keeps running while
        # backgrounded. "voip" is a stretch goal documented in the
        # entitlements section but intentionally left out for v0.1.
        UIBackgroundModes:
          - audio
        CFBundleShortVersionString: 0.1.0
        CFBundleVersion: "0.1.0"
    entitlements:
      path: concord_iOS/concord_iOS.entitlements
      properties:
        # Multicast networking — INTENTIONALLY DISABLED 2026-04-09.
        # Even paid-tier Developer Program membership is NOT sufficient to
        # use `com.apple.developer.networking.multicast`; Apple requires
        # a separate human-review approval via
        # https://developer.apple.com/contact/request/networking-multicast
        # before the provisioning profile will include this entitlement.
        # The Xcode-managed profile fetch fails the build if we declare
        # the entitlement here without Apple having granted it.
        #
        # NSBonjourServices + NSLocalNetworkUsageDescription in the
        # Info.plist still work without this entitlement — mDNS
        # advertisement and discovery go through Apple's mDNSResponder
        # daemon, which is entitled at the system level. What we lose is
        # the ability to send/receive custom multicast UDP packets
        # directly from our process, which matters only for
        # non-Bonjour broadcast protocols.
        #
        # FOLLOW-UP: when Apple approves the multicast request, re-add
        #     com.apple.developer.networking.multicast: true
        # here, regenerate the Xcode project, and rebuild. ~30s change.
        #
        # com.apple.developer.networking.multicast: true  # awaiting Apple approval

        # Wi-Fi info — SSID visibility (foreground-only).
        com.apple.developer.networking.wifi-info: true
        # Application groups — empty for v0.1; populate when a widget /
        # share extension target lands.
        com.apple.security.application-groups: []
        # Keychain access group — team-prefixed at build time.
        keychain-access-groups:
          - "$(AppIdentifierPrefix)com.concord.chat"
    scheme:
      environmentVariables:
        RUST_BACKTRACE: full
        RUST_LOG: info
    settings:
      base:
        ENABLE_BITCODE: false
        # xcodegen regenerates the entitlements file from project.yml
        # properties on each build, which Xcode detects as a mid-build
        # modification. This flag tells Xcode to accept it.
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: true
        ARCHS: [arm64]
        VALID_ARCHS: arm64
        # INS-020 — universal iPhone + iPad device family. Tauri's default
        # init does not set this; without it the build setting overrides
        # the Info.plist UIDeviceFamily key with iPhone-only at link time
        # and Xcode emits a UIDeviceFamily-overwrite warning. Setting it
        # here is the long-term right answer because project.yml is the
        # source-of-truth Tauri regenerates the Xcode project from on
        # every `cargo tauri ios init` run. 1 = iPhone, 2 = iPad.
        TARGETED_DEVICE_FAMILY: "1,2"
        LIBRARY_SEARCH_PATHS[arch=x86_64]: $(inherited) $(PROJECT_DIR)/Externals/x86_64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        LIBRARY_SEARCH_PATHS[arch=arm64]: $(inherited) $(PROJECT_DIR)/Externals/arm64/$(CONFIGURATION) $(SDKROOT)/usr/lib/swift $(TOOLCHAIN_DIR)/usr/lib/swift/$(PLATFORM_NAME) $(TOOLCHAIN_DIR)/usr/lib/swift-5.0/$(PLATFORM_NAME)
        ALWAYS_EMBED_SWIFT_STANDARD_LIBRARIES: true
        EXCLUDED_ARCHS[sdk=iphoneos*]: x86_64
      groups: [app]
    dependencies:
      - framework: libapp.a
        embed: false
      - sdk: CoreGraphics.framework
      - sdk: Metal.framework
      - sdk: MetalKit.framework
      - sdk: QuartzCore.framework
      - sdk: Security.framework
      - sdk: UIKit.framework
      - sdk: WebKit.framework
    preBuildScripts:
      - script: cargo tauri ios xcode-script -v --platform ${PLATFORM_DISPLAY_NAME:?} --sdk-root ${SDKROOT:?} --framework-search-paths "${FRAMEWORK_SEARCH_PATHS:?}" --header-search-paths "${HEADER_SEARCH_PATHS:?}" --gcc-preprocessor-definitions "${GCC_PREPROCESSOR_DEFINITIONS:-}" --configuration ${CONFIGURATION:?} ${FORCE_COLOR} ${ARCHS:?}
        name: Build Rust Code
        basedOnDependencyAnalysis: false
        outputFiles:
          - $(SRCROOT)/Externals/x86_64/${CONFIGURATION}/libapp.a
          - $(SRCROOT)/Externals/arm64/${CONFIGURATION}/libapp.a