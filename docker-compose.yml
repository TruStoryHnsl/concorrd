services:
  conduwuit:
    image: ghcr.io/matrix-construct/tuwunel:main
    restart: unless-stopped
    volumes:
      - ./data/conduwuit:/var/lib/conduwuit
    environment:
      CONDUWUIT_SERVER_NAME: ${CONDUWUIT_SERVER_NAME}
      CONDUWUIT_DATABASE_PATH: /var/lib/conduwuit
      CONDUWUIT_PORT: ${CONDUWUIT_PORT}
      CONDUWUIT_ADDRESS: 0.0.0.0
      CONDUWUIT_MAX_REQUEST_SIZE: 20000000
      CONDUWUIT_ALLOW_REGISTRATION: "true"
      CONDUWUIT_REGISTRATION_TOKEN: ${CONDUWUIT_REGISTRATION_TOKEN}
      CONDUWUIT_ALLOW_PRESENCE: "true"
      # Federation: enabled with allowlist-only mode.
      # forbidden_remote_server_names blocks ALL servers by default.
      # allowed_remote_server_names overrides the block for approved instances.
      CONDUWUIT_ALLOW_FEDERATION: ${CONDUWUIT_ALLOW_FEDERATION:-true}
      CONDUWUIT_FORBIDDEN_REMOTE_SERVER_NAMES: ${CONDUWUIT_FORBIDDEN_REMOTE_SERVER_NAMES:-'[".*"]'}
      CONDUWUIT_ALLOWED_REMOTE_SERVER_NAMES: ${CONDUWUIT_ALLOWED_REMOTE_SERVER_NAMES:-'[]'}
      CONDUWUIT_ALLOW_PUBLIC_ROOM_DIRECTORY_OVER_FEDERATION: "false"
      CONDUWUIT_TRUSTED_SERVERS: '["matrix.org"]'
      CONDUWUIT_LOG: "info"
    healthcheck:
      disable: true
    networks:
      - concord

  concord-api:
    build: ./server
    restart: unless-stopped
    volumes:
      - ./data/concord:/data
    environment:
      CONCORD_DATA_DIR: /data
      MATRIX_HOMESERVER_URL: http://conduwuit:${CONDUWUIT_PORT}
      CONDUWUIT_SERVER_NAME: ${CONDUWUIT_SERVER_NAME}
      CONDUWUIT_REGISTRATION_TOKEN: ${CONDUWUIT_REGISTRATION_TOKEN}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ws://livekit:7880
      METERED_APP_NAME: ${METERED_APP_NAME:-}
      METERED_API_KEY: ${METERED_API_KEY:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      FREESOUND_API_KEY: ${FREESOUND_API_KEY:-}
      INSTANCE_NAME: ${INSTANCE_NAME:-${CONDUWUIT_SERVER_NAME}}
    depends_on:
      conduwuit:
        condition: service_started
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - concord

  livekit:
    image: livekit/livekit-server:v1.8
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${LIVEKIT_TURN_PORT:-3478}:3478/udp"
      - "${LIVEKIT_TURN_PORT:-3478}:3478/tcp"
      - "${LIVEKIT_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_UDP_START:-50000}-${LIVEKIT_UDP_END:-50100}:50000-50100/udp"
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: --config /etc/livekit.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - concord

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - "${BIND_HOST:-0.0.0.0}:${HTTP_PORT:-8080}:8080"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./downloads:/srv/downloads:ro
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:-:8080}
    depends_on:
      conduwuit:
        condition: service_started
      concord-api:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - concord

networks:
  concord:
    driver: bridge
