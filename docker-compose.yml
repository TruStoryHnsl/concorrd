services:
  conduwuit:
    image: ghcr.io/matrix-construct/tuwunel:latest
    restart: unless-stopped
    volumes:
      - ./data/conduwuit:/var/lib/conduwuit
    environment:
      CONDUWUIT_SERVER_NAME: ${CONDUWUIT_SERVER_NAME}
      CONDUWUIT_DATABASE_PATH: /var/lib/conduwuit
      CONDUWUIT_PORT: ${CONDUWUIT_PORT}
      CONDUWUIT_ADDRESS: 0.0.0.0
      CONDUWUIT_MAX_REQUEST_SIZE: 20000000
      CONDUWUIT_ALLOW_REGISTRATION: "true"
      CONDUWUIT_REGISTRATION_TOKEN: ${CONDUWUIT_REGISTRATION_TOKEN}
      CONDUWUIT_ALLOW_PRESENCE: "true"
      CONDUWUIT_ALLOW_FEDERATION: "false"
      CONDUWUIT_TRUSTED_SERVERS: '["matrix.org"]'
      CONDUWUIT_LOG: "info"
    healthcheck:
      disable: true
    networks:
      - concorrd

  concorrd-api:
    build: ./server
    restart: unless-stopped
    volumes:
      - ./data/concorrd:/data
    environment:
      CONCORRD_DATA_DIR: /data
      MATRIX_HOMESERVER_URL: http://conduwuit:${CONDUWUIT_PORT}
      CONDUWUIT_SERVER_NAME: ${CONDUWUIT_SERVER_NAME}
      CONDUWUIT_REGISTRATION_TOKEN: ${CONDUWUIT_REGISTRATION_TOKEN}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      LIVEKIT_URL: ws://livekit:7880
      METERED_APP_NAME: ${METERED_APP_NAME:-}
      METERED_API_KEY: ${METERED_API_KEY:-}
      ADMIN_USER_IDS: ${ADMIN_USER_IDS:-}
      FREESOUND_API_KEY: ${FREESOUND_API_KEY:-}
      INSTANCE_NAME: ${INSTANCE_NAME:-Concord}
    depends_on:
      conduwuit:
        condition: service_started
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - concorrd

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    ports:
      - "${LIVEKIT_TURN_PORT:-3478}:3478/udp"
      - "${LIVEKIT_TURN_PORT:-3478}:3478/tcp"
      - "${LIVEKIT_TCP_PORT:-7881}:7881"
      - "${LIVEKIT_UDP_START:-50000}-${LIVEKIT_UDP_END:-50100}:50000-50100/udp"
    volumes:
      - ./config/livekit.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command: --config /etc/livekit.yaml
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - concorrd

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT}:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./downloads:/usr/share/nginx/downloads:ro
    depends_on:
      conduwuit:
        condition: service_started
      concorrd-api:
        condition: service_healthy
      livekit:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - concorrd

networks:
  concorrd:
    driver: bridge
