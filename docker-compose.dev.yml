services:
  # Vite dev server with HMR.
  #
  # Source is bind-mounted (ro) for live editing.
  #
  # package.json and package-lock.json are ALSO bind-mounted so the container
  # sees the current host state of dependencies. Combined with the named
  # node_modules volume and the runtime `npm ci` in Dockerfile.dev, this
  # means dependency changes on the host are picked up on container restart
  # — no image rebuild needed.
  vite-dev:
    build:
      context: .
      dockerfile: web/Dockerfile.dev
    volumes:
      - ./client/src:/app/src:ro
      - ./client/index.html:/app/index.html:ro
      - ./client/vite.config.ts:/app/vite.config.ts:ro
      - ./client/tsconfig.json:/app/tsconfig.json:ro
      - ./client/tsconfig.app.json:/app/tsconfig.app.json:ro
      - ./client/tsconfig.node.json:/app/tsconfig.node.json:ro
      - ./client/eslint.config.js:/app/eslint.config.js:ro
      - ./client/package.json:/app/package.json:ro
      - ./client/package-lock.json:/app/package-lock.json:ro
      # Named volume so node_modules persists across container recreates.
      # First startup on a fresh volume takes ~30-60s for npm ci; subsequent
      # startups skip it if the lockfile matches.
      - concord-vite-node-modules:/app/node_modules
    networks:
      - concord

  # Override web to use dev Caddyfile (proxies to vite-dev instead of static)
  web:
    volumes:
      - ./config/Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./downloads:/srv/downloads:ro
    depends_on:
      conduwuit:
        condition: service_started
      concord-api:
        condition: service_healthy
      livekit:
        condition: service_healthy
      vite-dev:
        condition: service_started

volumes:
  concord-vite-node-modules:

networks:
  concord:
    driver: bridge
