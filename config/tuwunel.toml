# Tuwunel runtime configuration — federation settings
#
# This file is the single source of truth for federation allowlist settings.
# It is managed by the Concord admin UI at runtime and by install.sh on first
# deployment. Hand-editing is supported but any values under [global] will be
# overwritten when the Admin panel applies federation changes.
#
# After any change to this file, the conduwuit container must be restarted
# to pick up new values. The Concord admin UI does this automatically via
# the docker-socket-proxy sidecar.
#
# Other Tuwunel configuration (server name, database path, ports, etc.)
# continues to be supplied via environment variables in docker-compose.yml.

[global]
# Master federation toggle. When false, this instance will neither send
# nor accept any federated traffic regardless of the allow/forbid lists.
allow_federation = true

# Regex patterns for server names that should NEVER federate with us.
# The default of [".*"] denies all remote servers by default — allowed
# servers are then re-admitted via allowed_remote_server_names below.
forbidden_remote_server_names = [".*"]

# Regex patterns for server names that ARE allowed to federate with us.
# Each pattern is matched against the full remote server name.
# Patterns are generated from plain server names by the Concord admin UI
# (fully anchored: ^escaped-name$).
allowed_remote_server_names = []
