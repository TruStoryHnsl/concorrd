# See docs/voice/port-coherence.md for the four-file port contract.
# Editing port_range_start / port_range_end here REQUIRES co-editing
# docker-compose.yml (livekit.ports[]) and verifying turnserver.conf
# stays disjoint. CI's config-lint job enforces this on every PR.
port: 7880
log_level: info
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  use_external_ip: true
  # Allow UDP through even when TURN is available — direct connections
  # are lower latency. Clients behind symmetric NAT will fall back to
  # TURN automatically via ICE candidate prioritization.
  allow_tcp_fallback: true
  stun_servers:
    - stun.l.google.com:19302
    - stun1.l.google.com:19302
room:
  empty_timeout: 300         # close room 5 min after last participant leaves
  departure_timeout: 20      # grace period before marking participant as gone
turn:
  enabled: false
  # Built-in TURN disabled — Concord bundles coturn as a dedicated TURN
  # relay (see docker-compose.yml coturn service). This avoids port
  # conflicts and gives full control over relay configuration and
  # credential management. TURN credentials are generated by the Concord
  # API (server/routers/voice.py) using the shared TURN_SECRET and
  # passed to clients in the voice token response as ICE servers. The
  # LiveKit SDK's connectOptions.rtcConfig.iceServers carries them into
  # the WebRTC ICE agent, which handles TURN negotiation natively.
  #
  # Port topology:
  #   Client → coturn 3478/udp (or 443/tcp via sslh) → relay ports
  #   49152-49252 → LiveKit 50000-50100/udp on host loopback.
  #   coturn's allowed-peer-ip=127.0.0.1 permits the loopback relay.
