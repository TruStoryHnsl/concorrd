# mautrix-discord bridge config template (INS-024 Wave 2).
#
# This file is committed to the repo with placeholder values. The
# runtime registration.yaml (with real tokens) is generated by
# `server/services/bridge_config.py` on every admin "Enable" or
# "Rotate" call and lives alongside this file as `registration.yaml`
# (gitignored, mode 0640).
#
# Fields marked "MANAGED BY CONCORD" are overwritten each time the
# admin UI enables or rotates the bridge. Fields marked "STATIC" are
# safe to hand-edit; they are not touched by the concord-api flow.
#
# Upstream reference:
#   https://github.com/mautrix/discord/blob/v0.7.2/example-config.yaml

# Homeserver details (STATIC). mautrix-discord reaches tuwunel over
# the compose network at the service DNS name `conduwuit:<port>`.
# The `address` uses the env var substitution that docker-compose
# performs when the service starts.
homeserver:
  address: http://conduwuit:${CONDUWUIT_PORT}
  domain: ${CONDUWUIT_SERVER_NAME}
  # mautrix-discord uses the well-known discovery, but we provide
  # both paths to survive hand-edits to Caddy's reverse proxy.
  verify_ssl: false
  software: standard

# Application Service details (MANAGED BY CONCORD — regenerated each
# time the admin "Enable" or "Rotate" flow runs. Do NOT hand-edit;
# concord-api overwrites these on the next mutation).
#
# The actual values are NEVER present in this template. They live in
# registration.yaml alongside this file, and mautrix-discord reads
# both files on startup (registration.yaml for tokens, config.yaml
# for everything else).
appservice:
  address: http://concord-discord-bridge:29334
  hostname: 0.0.0.0
  port: 29334

  database:
    type: sqlite3-fk-wal
    uri: file:/data/mautrix-discord.db?_txlock=immediate
    max_open_conns: 20
    max_idle_conns: 2

  id: concord_discord
  bot:
    username: discordbot
    displayname: Discord Bridge
    avatar: mxc://maunium.net/nIdEykemnwdisvHbpxflpDlC

  ephemeral_events: true
  async_transactions: false

# Bridge behavior (STATIC defaults appropriate for a self-hosted
# commercial deployment — tune per-operator via admin UI if needed).
bridge:
  username_template: _discord_{{.}}
  displayname_template: "{{or .GlobalName .Username}} (Discord)"
  channel_name_template: "{{.Name}}"
  guild_name_template: "{{.Name}}"
  private_chat_portal_meta: true

  # Relay mode lets a single bot bridge channels without user-mode
  # puppeting. Disabled by default — operators enable it from the
  # BridgesTab once they have invited the bot to the target guild.
  relay:
    enabled: false
    admin_only: true

  # ACL — who on the Matrix side is allowed to use the bridge.
  # Defaults to "only admins defined in ADMIN_USER_IDS" on the
  # concord homeserver. The web deployment tightens this further in
  # `server/routers/admin_bridges.py` — the admin router rejects any
  # enable/disable/rotate call from a non-admin user long before
  # mautrix-discord's own ACL runs.
  permissions:
    "*": relay

# Logging (STATIC). JSON output is what json-file docker log driver
# expects for clean structured ingestion. Keep level at "info" — debug
# on a production bridge produces ~500 MB/day on a busy guild.
logging:
  min_level: info
  writers:
    - type: stdout
      format: json
