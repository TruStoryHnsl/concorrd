# sslh — SNI multiplexer for the bundled Concord web + TURN stack.
#
# Listens on the host's port 443 (network_mode: host in docker-compose).
# Routes by SNI:
#
#   * SNI == turn.<INSTANCE_DOMAIN>    -> coturn TLS on 5349 (TURN-over-TLS)
#   * anything else (any SNI / no SNI) -> Caddy on 8080 (web/api/conduwuit)
#
# The two SNI targets live on the same host. coturn is in host networking
# mode (so 5349 is on the host's loopback, not a docker bridge). Caddy is
# in bridge networking with its container 8080 published on host 8080.
# Both are reachable from sslh at 127.0.0.1.
#
# About keepalive:
#   Set per-block (NOT at the file's top level — sslh-select v2.3.1
#   rejects top-level ``keepalive`` and exits). With keepalive on each
#   forwarded protocol entry, sslh enables SO_KEEPALIVE on the upstream
#   socket so the kernel reaps dead peers. Prevents the 25-day half-open
#   socket accumulation that wedged this stack on orrgate.
#
# About the SNI hostname:
#   The string ``turn.example.com`` below is a placeholder. install.sh
#   rewrites it to ``turn.${INSTANCE_DOMAIN}`` from the operator's
#   .env at install time. Operators should not hand-edit this file
#   directly — change INSTANCE_DOMAIN in .env and rerun install.sh,
#   which regenerates the SNI rules from the canonical source of truth.

verbose: 2;
foreground: true;
listen: ( { host: "0.0.0.0"; port: "443"; keepalive: true; } );
protocols: (
    {
        name: "tls";
        host: "127.0.0.1"; port: "5349";
        sni_hostnames: [ "turn.example.com" ];
        keepalive: true;
    },
    {
        name: "tls";
        host: "127.0.0.1"; port: "8080";
        keepalive: true;
    },
    {
        name: "anyprot";
        host: "127.0.0.1"; port: "8080";
        keepalive: true;
    }
);
